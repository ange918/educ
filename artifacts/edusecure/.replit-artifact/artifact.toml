kind = "web"
previewPath = "/"
title = "ÉduSecure"
version = "1.0.0"
id = "artifacts/edusecure"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20909

[services.development]
run = "pnpm --filter @workspace/edusecure run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/edusecure", "run", "build" ]
publicDir = "artifacts/edusecure/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20909"
BASE_PATH = "/"
